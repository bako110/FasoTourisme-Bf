# fly.toml app configuration file generated for tourisme-burkina-api on 2026-03-14T14:50:27+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tourisme-burkina-api'
primary_region = 'cdg'

[build]

[env]
  API_V1_PREFIX = '/api/v1'
  APP_NAME = 'Tourisme Burkina API'
  APP_VERSION = '1.0.0'
  DATABASE_NAME = 'tourisme_burkina'
  DEBUG = 'false'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
